services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: skill-market-backend
    container_name: skill-market-backend
    ports:
      - "3000:3000"
    environment:
      SECRET_KEY: "${SECRET_KEY:?set SECRET_KEY in repo-root .env (see DEPLOYMENT.md)}"
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080"
      SKILL_REPO_PATH: "/app/skill_repo"
    volumes:
      - ./skill_repo:/app/skill_repo:ro

  frontend:
    image: python:3.12-slim
    container_name: skill-market-frontend
    command: python /srv/server.py
    volumes:
      - ./frontend:/srv/frontend:ro
      - ./frontend-server.py:/srv/server.py:ro
    ports:
      - "8080:8080"
    depends_on:
      - backend
