{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover, share, and install AI-powered skills to supercharge your workflow. Your internal marketplace for AI development tools.">
  <title>{% block title %}Skill Market{% endblock %}</title>
  <link rel="icon" type="image/png" href="{% static 'skills/favicon.png' %}">
  <link rel="stylesheet" href="{% static 'skills/vendor/tailwind.min.css' %}">
  <link id="hljs-theme" rel="stylesheet" href="{% static 'skills/vendor/github.min.css' %}">
  <link rel="stylesheet" href="{% static 'skills/css/app.css' %}?v={% now 'U' %}">
  <script>
    // Apply theme before first paint to avoid flash
    (function () {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var themeLink = document.getElementById('hljs-theme');
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
        themeLink.href = "{% static 'skills/vendor/github-dark.min.css' %}";
      } else {
        themeLink.href = "{% static 'skills/vendor/github.min.css' %}";
      }
    })();
  </script>
</head>
<body class="min-h-screen"
      style="background-color:var(--bg-primary);color:var(--text-primary)"
      {% block body_attrs %}{% endblock %}>

{% block header %}{% endblock %}

{% block content %}{% endblock %}

<footer class="text-center py-4 text-sm border-t" style="color:var(--text-secondary);border-color:var(--border)">
  {% block footer %}<span id="footer-count">—</span> skills available{% endblock %}
</footer>

<button id="back-to-top" class="p-3 rounded-full shadow-lg border" style="position: fixed; bottom: 2rem; right: 2rem; background-color: var(--bg-card); border-color: var(--border); color: var(--text-primary); z-index: 9999; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);" aria-label="Back to top" title="Back to Top (J)">
  <svg style="width: 1.25rem; height: 1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7 7 7M12 3v18"/></svg>
</button>

<script src="{% static 'skills/js/common.js' %}?v={{ request.resolver_match.url_name|default:'1' }}&t={% now 'U' %}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
