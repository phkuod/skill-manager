<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Skill Market</title>
  <link rel="stylesheet" href="vendor/tailwind.min.css">
  <link rel="stylesheet" href="vendor/github-dark.min.css">
  <link rel="stylesheet" href="assets/app.css">
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (stored === 'dark' || (!stored && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body class="min-h-screen" style="background-color:var(--bg-primary);color:var(--text-primary)">

<header class="sticky top-0 z-50 border-b px-6 py-4 flex items-center justify-between" style="background-color:var(--bg-secondary);border-color:var(--border)">
  <a href="index.html" title="Back to catalog (Esc)" class="flex items-center gap-2 text-sm font-medium" style="color:var(--text-secondary);text-decoration:none">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back
    <kbd class="text-xs px-1.5 py-0.5 rounded border ml-1" style="border-color:var(--border);font-family:inherit">Esc</kbd>
  </a>
  <button id="theme-toggle" class="p-2 rounded-lg border" style="border-color:var(--border)" aria-label="Toggle theme">
    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"/>
    </svg>
    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>
</header>

<div class="max-w-6xl mx-auto px-6 py-8">
  <p id="load-state" class="py-12 text-center" style="color:var(--text-secondary)">Loading…</p>
  <div id="skill-root" class="hidden">

    <div class="mb-8">
      <div class="flex items-start gap-4 mb-4">
        <span id="skill-icon" class="text-5xl"></span>
        <div class="flex-1">
          <div class="flex flex-wrap items-center gap-2 mb-1">
            <h1 id="skill-name" class="text-2xl font-bold" style="color:var(--text-primary)"></h1>
            <span id="skill-category" class="text-sm px-2 py-0.5 rounded-full category-badge"></span>
            <span id="skill-license" class="text-xs px-2 py-0.5 rounded-full border" style="color:var(--text-secondary);border-color:var(--border)"></span>
          </div>
          <p id="skill-description" style="color:var(--text-secondary)"></p>
        </div>
      </div>

      <div id="version-row" class="hidden items-center gap-2">
        <label class="text-sm" style="color:var(--text-secondary)">Version:</label>
        <select id="version-select" class="text-sm rounded-lg border px-2 py-1"
          style="background-color:var(--bg-secondary);color:var(--text-primary);border-color:var(--border)"></select>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">

      <div class="flex-1 min-w-0">

        <section class="rounded-xl border mb-6" style="border-color:var(--border)">
          <div class="px-5 py-4 border-b" style="border-color:var(--border)">
            <h2 class="font-semibold" style="color:var(--text-primary)">Install</h2>
          </div>
          <div class="p-5">
            <div class="flex gap-2 mb-4">
              <button class="install-tab active px-3 py-1 text-sm rounded-lg font-medium" data-tab="claude">Claude Code</button>
              <button class="install-tab px-3 py-1 text-sm rounded-lg font-medium" data-tab="opencode">Opencode CLI</button>
            </div>
            <div id="tab-claude" class="install-tab-content">
              <div class="rounded-lg p-3" style="background-color:var(--bg-secondary)">
                <code id="cmd-claude" class="block text-sm break-all" style="color:var(--text-primary)"></code>
              </div>
            </div>
            <div id="tab-opencode" class="install-tab-content hidden">
              <div class="rounded-lg p-3" style="background-color:var(--bg-secondary)">
                <code id="cmd-opencode" class="block text-sm break-all" style="color:var(--text-primary)"></code>
              </div>
            </div>
          </div>
        </section>

        <section class="rounded-xl border mb-6" style="border-color:var(--border)">
          <div class="px-5 py-4 border-b" style="border-color:var(--border)">
            <h2 class="font-semibold" style="color:var(--text-primary)">Documentation</h2>
          </div>
          <div id="skill-content" class="p-5 skill-markdown"></div>
        </section>

        <section id="files-section" class="rounded-xl border hidden" style="border-color:var(--border)">
          <div class="px-5 py-4 border-b" style="border-color:var(--border)">
            <h2 class="font-semibold" style="color:var(--text-primary)">Files</h2>
          </div>
          <div id="files-list" class="divide-y" style="border-color:var(--border)"></div>
        </section>

      </div>

      <div class="lg:w-72 flex-shrink-0 space-y-4">

        <div class="rounded-xl border p-5" style="border-color:var(--border);background-color:var(--bg-card)">
          <h3 class="font-semibold mb-4" style="color:var(--text-primary)">Details</h3>
          <dl class="space-y-3 text-sm">
            <div class="flex justify-between">
              <dt style="color:var(--text-secondary)">Files</dt>
              <dd id="detail-files" style="color:var(--text-primary)"></dd>
            </div>
            <div class="flex justify-between gap-4">
              <dt class="shrink-0" style="color:var(--text-secondary)">License</dt>
              <dd id="detail-license" class="text-right" style="color:var(--text-primary)"></dd>
            </div>
            <div class="flex justify-between">
              <dt style="color:var(--text-secondary)">Updated</dt>
              <dd id="detail-updated" style="color:var(--text-primary)"></dd>
            </div>
            <div class="flex justify-between">
              <dt style="color:var(--text-secondary)">Category</dt>
              <dd id="detail-category" style="color:var(--text-primary)"></dd>
            </div>
          </dl>
        </div>

        <div class="rounded-xl border p-5" style="border-color:var(--border);background-color:var(--bg-card)">
          <h3 class="font-semibold mb-4" style="color:var(--text-primary)">Install Paths</h3>
          <div class="space-y-3 text-sm">
            <div>
              <p class="mb-1" style="color:var(--text-secondary)">Claude Code</p>
              <code id="path-claude" class="text-xs break-all" style="color:var(--text-primary)"></code>
            </div>
            <div>
              <p class="mb-1" style="color:var(--text-secondary)">Opencode CLI</p>
              <code id="path-opencode" class="text-xs break-all" style="color:var(--text-primary)"></code>
            </div>
          </div>
        </div>

        <a id="download-link" href="#" title="Download ZIP (D)"
          class="flex items-center justify-center gap-2 w-full py-3 px-4 rounded-xl font-medium text-sm text-white"
          style="background-color:var(--accent)">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download ZIP
          <kbd class="text-xs px-1.5 py-0.5 rounded border ml-1" style="border-color:rgba(255,255,255,0.4);font-family:inherit">D</kbd>
        </a>

      </div>
    </div>
  </div>
</div>

<script src="vendor/marked.min.js"></script>
<script src="vendor/highlight.min.js"></script>
<script src="config.js"></script>
<script src="assets/common.js"></script>
<script src="assets/skill.js"></script>
</body>
</html>
